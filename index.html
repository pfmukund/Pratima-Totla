<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Official portfolio of Dr. Pratima Totla — National Secretary, Republican Party of India (RPI). Cultural icon, public communicator, and global voice for dignity, equality, and citizen-first leadership." />
    <meta property="og:title" content="Dr. Pratima Totla — Leadership with Purpose" />
    <meta property="og:description" content="National Secretary, RPI. Mrs. India Fashion Icon. Producer. Philanthropist. A life lived in service of dignity and dream." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://pratimatotla.com/img/personas/cultural-icon.webp" />
    <meta property="og:url" content="https://pratimatotla.com/" />
    <link rel="canonical" href="https://pratimatotla.com/" />

    <!-- Self-hosted fonts via @fontsource (see src/fonts.css). No Google Fonts
         round-trip. Cormorant Garamond 400 is the hero H1 font — preload it
         so LCP doesn't wait on font discovery. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/cormorant-garamond-latin-400-normal.woff2" />

    <!-- Preload the LCP hero image. Browser picks the best format its UA advertises. -->
    <link rel="preload" as="image" href="/img/personas/cultural-icon.avif" type="image/avif" fetchpriority="high" />
    <link rel="preload" as="image" href="/img/personas/cultural-icon.webp" type="image/webp" />

    <title>Dr. Pratima Totla — Leadership with Purpose</title>

    <!-- Critical above-fold CSS inlined so first paint has the correct
         background, colour, and hero H1 font even before the main stylesheet
         arrives. Prevents the flash of unstyled content. -->
    <style>
      :root {
        color-scheme: dark;
        font-size: 18px;
        --color-ink: #08070a;
        --color-cream: #f5efde;
      }
      @media (max-width: 768px) { :root { font-size: 17px; } }
      html, body {
        margin: 0;
        background: #08070a;
        color: #f5efde;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; }
      /* Avoid a flash of default serif before the main CSS loads the real font */
      h1, h2, h3, h4 {
        font-family: "Cormorant Garamond", "Times New Roman", serif;
        margin: 0;
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
